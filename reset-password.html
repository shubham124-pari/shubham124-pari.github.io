<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap">
    <title>Reset Password | Shubham Kumar</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <meta name="robots" content="noindex, nofollow">
</head>
<body>

    <canvas id="matrixRain"></canvas>

    <div id="pageTransition" class="page-transition"></div>

    <header class="header">
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">SK</a>
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
                <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>
    </header>

    <main>
        <div class="dashboard-guard" style="max-width:420px;" id="resetWrap">
            <span class="signin-tag">Account recovery</span>
            <h1 class="loader-title" style="font-size:1.8rem;margin:14px 0;">Set a new password</h1>
            <p>Choose a new password for your account.</p>

            <div class="auth-alert" id="resetAlert"></div>

            <form id="resetForm" class="auth-form active" style="display:flex;text-align:left;">
                <input type="password" name="password" placeholder="New password (min 6 chars)" required minlength="6" autocomplete="new-password">
                <input type="password" name="confirm" placeholder="Confirm new password" required minlength="6" autocomplete="new-password">
                <button type="submit" class="signin-submit"><span>Reset Password</span></button>
            </form>

            <p class="signin-note"><a href="index.html" style="color:var(--accent-gold-soft);">&larr; Back to home</a></p>
        </div>
    </main>

<script src="assets/js/script.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/matrix.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("resetForm");
    const alertEl = document.getElementById("resetAlert");

    function showAlert(type, text) {
        alertEl.textContent = text;
        alertEl.className = "auth-alert show " + type;
    }

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (!token) {
        form.style.display = "none";
        showAlert("error", "This reset link is missing its token. Please request a new one from the Forgot Password page.");
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const password = form.querySelector('[name="password"]').value;
        const confirm = form.querySelector('[name="confirm"]').value;

        if (password !== confirm) {
            showAlert("error", "Passwords do not match.");
            return;
        }

        const btn = form.querySelector("button[type=submit]");
        const original = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = "<span>Resetting...</span>";

        try {
            const data = await skpApiRequest("/auth/reset-password", {
                method: "POST",
                body: { token, password, confirm },
            });
            showAlert("success", (data.message || "Password updated.") + " Redirecting to home...");
            form.style.display = "none";
            setTimeout(() => { window.location.href = "index.html"; }, 1800);
        } catch (err) {
            showAlert("error", err.message);
            btn.disabled = false;
            btn.innerHTML = original;
        }
    });
});
</script>

</body>
</html>
