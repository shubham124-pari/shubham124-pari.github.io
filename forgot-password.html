<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap">
    <title>Forgot Password | Shubham Kumar</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <meta name="robots" content="noindex, nofollow">
</head>
<body>

    <div id="pageTransition" class="page-transition"></div>

    <header class="header">
    <nav class="navbar">
        <div class="nav-container"></div>
    </nav>
    </header>

    <main>
        <div class="dashboard-guard" style="max-width:420px;">
            <span class="signin-tag">Account recovery</span>
            <h1 class="loader-title" style="font-size:1.8rem;margin:14px 0;">Forgot your password?</h1>
            <p>Enter the email you signed up with — if an account exists, we'll send a link to reset your password.</p>

            <div class="auth-alert" id="forgotAlert"></div>

            <form id="forgotForm" class="auth-form active" style="display:flex;text-align:left;">
                <input type="email" name="email" placeholder="Email address" required autocomplete="email">
                <button type="submit" class="signin-submit"><span>Send Reset Link</span></button>
            </form>

            <p class="signin-note"><a href="index.html" style="color:var(--accent-gold-soft);">&larr; Back to home</a></p>
        </div>
    </main>

<script src="assets/js/script.js"></script>
<script src="assets/js/auth.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("forgotForm");
    const alertEl = document.getElementById("forgotAlert");

    function showAlert(type, text) {
        alertEl.textContent = text;
        alertEl.className = "auth-alert show " + type;
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = form.querySelector("button[type=submit]");
        const original = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = "<span>Sending...</span>";

        try {
            const email = form.querySelector('[name="email"]').value.trim();
            const data = await skpApiRequest("/auth/forgot-password", {
                method: "POST",
                body: { email },
            });
            showAlert("success", data.message || "If an account exists for that email, a reset link has been sent.");
            form.reset();
        } catch (err) {
            showAlert("error", err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = original;
        }
    });
});
</script>

</body>
</html>
